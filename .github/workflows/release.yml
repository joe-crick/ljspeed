name: Release Binaries

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build for ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_name: ljspeed-linux-x64
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact_name: ljspeed-macos-x64
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact_name: ljspeed-macos-arm64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: ljspeed-windows-x64.exe

    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Build
        run: cargo build --release --target ${{ matrix.target }}
      - name: Rename binary
        shell: bash
        run: |
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            cp target/${{ matrix.target }}/release/ljspeed.exe ${{ matrix.artifact_name }}
          else
            cp target/${{ matrix.target }}/release/ljspeed ${{ matrix.artifact_name }}
          fi
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_name }}

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            ljspeed-linux-x64/ljspeed-linux-x64
            ljspeed-macos-x64/ljspeed-macos-x64
            ljspeed-macos-arm64/ljspeed-macos-arm64
            ljspeed-windows-x64.exe/ljspeed-windows-x64.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
